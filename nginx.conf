server {
    listen 80;
    server_name _; # Change this if you have a domain like quantumuz.uz

    # 1. Quantum Uz Frontend (Main)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 2. Ket Website Frontend
    # Access via http://IP:3002 or setup a subdomain
    # To use a path like /ket/, Next.js needs basePath configuration.
    
    # 3. Dirac Frontend
    # Access via http://IP:3003

    # 4. Django Unified Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 5. Django Admin Panel
    location /django-admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 6. Static & Media (Project Standards)
    location /static/ {
        alias /srv/data/quantum/static/;
    }

    location /media/ {
        alias /srv/data/quantum/media/;
    }
}
